version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pos_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME?DB_NAME is required}
      MYSQL_USER: ${DB_USER?DB_USER is required}
      MYSQL_PASSWORD: ${DB_PASSWORD?DB_PASSWORD is required}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./apps/backend-api
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${DB_USER?DB_USER is required}:${DB_PASSWORD?DB_PASSWORD is required}@db:3306/${DB_NAME?DB_NAME is required}
      JWT_SECRET: ${JWT_SECRET?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN?CORS_ORIGIN is required}
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  # Web Admin (Next.js)
  web-admin:
    build:
      context: ./apps/web-admin
      dockerfile: Dockerfile
    container_name: pos_web_admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL?NEXT_PUBLIC_API_URL is required}
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
