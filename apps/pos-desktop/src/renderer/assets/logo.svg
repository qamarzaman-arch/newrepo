<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00513f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006b54;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon - Modern POS Terminal with Checkmark -->
  <g transform="translate(10, 15)">
    <!-- Terminal Body -->
    <rect x="0" y="10" width="70" height="55" rx="8" fill="url(#logoGradient)" opacity="0.95"/>
    
    <!-- Screen -->
    <rect x="8" y="18" width="54" height="35" rx="4" fill="#ffffff" opacity="0.95"/>
    
    <!-- Screen Content Lines -->
    <rect x="14" y="24" width="30" height="3" rx="1.5" fill="#00513f" opacity="0.6"/>
    <rect x="14" y="30" width="40" height="3" rx="1.5" fill="#00513f" opacity="0.4"/>
    <rect x="14" y="36" width="25" height="3" rx="1.5" fill="#00513f" opacity="0.3"/>
    
    <!-- Checkmark Badge -->
    <circle cx="52" cy="42" r="12" fill="url(#accentGradient)" filter="url(#glow)"/>
    <path d="M 46 42 L 50 46 L 58 38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Stand -->
    <rect x="25" y="65" width="20" height="8" rx="2" fill="#00513f" opacity="0.7"/>
    <rect x="20" y="73" width="30" height="4" rx="2" fill="#00513f" opacity="0.5"/>
    
    <!-- Decorative Dots -->
    <circle cx="12" cy="70" r="2" fill="#60a5fa" opacity="0.6"/>
    <circle cx="58" cy="70" r="2" fill="#60a5fa" opacity="0.6"/>
  </g>
  
  <!-- Text - POSLytic -->
  <g transform="translate(100, 60)">
    <!-- POS -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="48" font-weight="800" fill="url(#logoGradient)" letter-spacing="-1">POS</text>
    
    <!-- Lytic -->
    <text x="105" y="0" font-family="Arial, sans-serif" font-size="48" font-weight="600" fill="url(#accentGradient)" letter-spacing="-1">Lytic</text>
    
    <!-- Tagline -->
    <text x="2" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#6b7280" letter-spacing="2">SMART RESTAURANT MANAGEMENT</text>
    
    <!-- Underline Accent -->
    <rect x="0" y="30" width="280" height="3" rx="1.5" fill="url(#logoGradient)" opacity="0.3"/>
    <rect x="0" y="30" width="80" height="3" rx="1.5" fill="url(#accentGradient)" opacity="0.8"/>
  </g>
</svg>
