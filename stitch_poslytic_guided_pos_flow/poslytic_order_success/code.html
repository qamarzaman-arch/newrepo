<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>POSLYTIC - Order Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#61f9e9",
                        "surface-container-low": "#1c1b1b",
                        "inverse-surface": "#e5e2e1",
                        "primary-fixed": "#83fba5",
                        "primary": "#6ee591",
                        "on-surface-variant": "#bdcabc",
                        "on-tertiary-fixed": "#00201d",
                        "primary-container": "#50c878",
                        "on-tertiary-container": "#004d47",
                        "error": "#ffb4ab",
                        "secondary-fixed-dim": "#fbbc00",
                        "surface-variant": "#353534",
                        "inverse-primary": "#006d36",
                        "surface-bright": "#393939",
                        "secondary-fixed": "#ffdfa0",
                        "tertiary-container": "#03c7b8",
                        "primary-fixed-dim": "#66dd8b",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-container": "#201f1f",
                        "outline-variant": "#3e4a3f",
                        "on-primary-container": "#005025",
                        "surface-container-high": "#2a2a2a",
                        "inverse-on-surface": "#313030",
                        "on-secondary-fixed-variant": "#5c4300",
                        "error-container": "#93000a",
                        "on-secondary-container": "#6d5000",
                        "surface-dim": "#131313",
                        "on-tertiary": "#003732",
                        "on-background": "#e5e2e1",
                        "on-error": "#690005",
                        "secondary": "#ffe2ab",
                        "surface-container-highest": "#353534",
                        "on-secondary": "#402d00",
                        "surface-tint": "#66dd8b",
                        "on-secondary-fixed": "#261a00",
                        "on-surface": "#e5e2e1",
                        "on-primary-fixed": "#00210c",
                        "secondary-container": "#ffbf00",
                        "on-tertiary-fixed-variant": "#005049",
                        "tertiary": "#45e3d3",
                        "surface": "#131313",
                        "on-primary-fixed-variant": "#005227",
                        "tertiary-fixed-dim": "#3adccc",
                        "on-primary": "#003919",
                        "outline": "#879487",
                        "background": "#131313",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .receipt-texture {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary-fixed overflow-hidden h-screen flex flex-col">
<!-- TopAppBar suppressed as per UX Goal: Success screen is focused/transactional -->
<main class="flex-1 flex flex-col items-center justify-center px-6 relative">
<!-- Background decorative element (The Kinetic Vault Aesthetic) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[30%] h-[30%] bg-tertiary/5 blur-[100px] rounded-full"></div>
</div>
<div class="max-w-xl w-full flex flex-col items-center z-10">
<!-- Success Indicator -->
<div class="mb-8 flex flex-col items-center">
<div class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-2xl shadow-primary/20 mb-6">
<span class="material-symbols-outlined text-on-primary-fixed text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-center text-on-surface mb-2">Order Successful!</h1>
<p class="font-headline text-primary text-xl font-bold tracking-widest">#ORD-8821</p>
</div>
<!-- Minimalist Receipt Preview (The Vault Layering) -->
<div class="w-full bg-surface-container-high rounded-3xl p-8 mb-10 shadow-2xl relative overflow-hidden receipt-texture">
<div class="flex justify-between items-start mb-8">
<div>
<h2 class="font-headline text-lg font-bold text-on-surface">POSLYTIC</h2>
<p class="text-on-surface-variant text-sm">Table 24 • Server: Alex M.</p>
</div>
<div class="text-right">
<p class="text-on-surface-variant text-xs uppercase tracking-widest font-bold">Today, 8:42 PM</p>
</div>
</div>
<div class="space-y-4 mb-8">
<div class="flex justify-between items-center">
<span class="text-on-surface">2x Truffle Risotto</span>
<span class="font-headline font-semibold">$56.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface">1x Wagyu Searing Kit</span>
<span class="font-headline font-semibold">$124.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface">3x Signature Negroni</span>
<span class="font-headline font-semibold">$48.00</span>
</div>
</div>
<div class="pt-6 border-t border-outline-variant/20 flex flex-col gap-2">
<div class="flex justify-between text-sm text-on-surface-variant">
<span>Subtotal</span>
<span>$228.00</span>
</div>
<div class="flex justify-between text-sm text-on-surface-variant">
<span>Tax (8.5%)</span>
<span>$19.38</span>
</div>
<div class="flex justify-between text-2xl font-headline font-black text-primary mt-2">
<span>Total</span>
<span>$247.38</span>
</div>
</div>
<!-- Decorative Receipt Cut-off -->
<div class="absolute bottom-0 left-0 w-full h-1 flex">
<div class="flex-1 border-b-2 border-dashed border-outline-variant/30"></div>
</div>
</div>
<!-- Action Cluster (Secondary) -->
<div class="grid grid-cols-3 gap-4 w-full mb-12">
<button class="bg-surface-container-lowest hover:bg-surface-container transition-colors p-4 rounded-xl flex flex-col items-center gap-2 group active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">print</span>
<span class="font-label text-xs font-medium text-on-surface-variant group-hover:text-on-surface">Print Receipt</span>
</button>
<button class="bg-surface-container-lowest hover:bg-surface-container transition-colors p-4 rounded-xl flex flex-col items-center gap-2 group active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">sms</span>
<span class="font-label text-xs font-medium text-on-surface-variant group-hover:text-on-surface">SMS Receipt</span>
</button>
<button class="bg-surface-container-lowest hover:bg-surface-container transition-colors p-4 rounded-xl flex flex-col items-center gap-2 group active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">mail</span>
<span class="font-label text-xs font-medium text-on-surface-variant group-hover:text-on-surface">Email Receipt</span>
</button>
</div>
</div>
</main>
<!-- Primary Action Bar -->
<footer class="p-8 flex justify-center bg-surface-container-low/50 backdrop-blur-xl border-t border-outline-variant/10">
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed h-16 px-16 rounded-xl font-headline font-extrabold text-lg flex items-center gap-3 shadow-xl shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all duration-300">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
            Start New Order
        </button>
</footer>
<!-- Suppress BottomNavBar because screen is transactional/success -->
</body></html>
